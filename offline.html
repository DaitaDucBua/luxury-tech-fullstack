<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - LuxuryTech</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .offline-container {
            background: white;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        .offline-icon {
            font-size: 80px;
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
        
        h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 15px;
        }
        
        p {
            font-size: 18px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        
        .retry-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .offline-tips {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #e9ecef;
        }
        
        .offline-tips h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
        }
        
        .offline-tips ul {
            list-style: none;
            text-align: left;
        }
        
        .offline-tips li {
            padding: 10px 0;
            color: #666;
            font-size: 14px;
        }
        
        .offline-tips li:before {
            content: "✓ ";
            color: #667eea;
            font-weight: bold;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        
        <h1>Không Có Kết Nối</h1>
        
        <p>
            Bạn đang offline. Vui lòng kiểm tra kết nối internet và thử lại.
        </p>
        
        <button class="retry-btn" onclick="location.reload()">
            🔄 Thử Lại
        </button>
        
        <div class="offline-tips">
            <h3>Gợi ý:</h3>
            <ul>
                <li>Kiểm tra kết nối WiFi hoặc dữ liệu di động</li>
                <li>Tắt chế độ máy bay nếu đang bật</li>
                <li>Khởi động lại router WiFi</li>
                <li>Một số trang đã lưu có thể xem offline</li>
            </ul>
        </div>
    </div>
    
    <script>
        // Auto retry when online
        window.addEventListener('online', () => {
            location.reload();
        });
        
        // Check connection status
        setInterval(() => {
            if (navigator.onLine) {
                location.reload();
            }
        }, 5000);
    </script>
</body>
</html>
